<style>
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #374151; border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: #4b5563; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
  .chart-container { position: relative; width: 100%; }
  .chart-container canvas { width: 100% !important; }
  @keyframes pulse-alarm {

    50% { opacity: 0.9; box-shadow: 0 0 0 12px rgba(239,68,68,0); }

    0% { opacity: 0; transform: translateY(12px); }
    100% { opacity: 1; transform: translateY(0); }

<script>
(function() {
  'use strict';

  // ---- 配置 ----
  var SUPABASE_URL = 'https://injxopkhbbwgegsmyvlw.supabase.co';
  var SUPABASE_ANON_KEY = 'sb_publishable_nZMQN_eTGwnUPIzK1YNn6Q_Rgno_PV0';

  // ---- 状态 ----
  var supabase = null;
  var isDemo = false;
  var currentDeviceId = null;
  var currentUser = null;
  var tempHumidityChart = null;
  var lightChart = null;
  var realtimeChannel = null;
  var demoTimer = null;
  var authMode = 'login';
  var localState = { sensor_armed: true, beep_enabled: true };
  var mockTelemetry = [];
  var mockAlarmEvents = [];

  // ---- DOM 引用 ----
  var $ = function(id) { return document.getElementById(id); };

  // ---- 模拟数据生成 ----
  function generateMockData() {
    var now = new Date();
    mockTelemetry = [];
    mockAlarmEvents = [];

    for (var i = 96; i >= 0; i--) {
      var ts = new Date(now - i * 15 * 60000);
      var hour = ts.getHours();
      var isDaytime = hour >= 6 && hour <= 20;
      var baseTemp = 22 + 4 * Math.sin(hour * Math.PI / 12);
      mockTelemetry.push({
        temperature: +(baseTemp + (Math.random() - 0.5) * 3).toFixed(1),
        humidity: +(55 - 5 * Math.sin(hour * Math.PI / 12) + (Math.random() - 0.5) * 10).toFixed(1),
        ambient_light: +(isDaytime ? 200 + Math.random() * 1500 : Math.random() * 5).toFixed(0),
        alarm_status: false,
        reported_at: ts.toISOString()
      });
    }

    var last = mockTelemetry[mockTelemetry.length - 1];
    last.temperature = 37.5;
    last.alarm_status = true;

    mockAlarmEvents = [
      { alarm_code: 1, created_at: new Date(now - 20*3600000).toISOString() },
      { alarm_code: 0, created_at: new Date(now - 19*3600000).toISOString() },
      { alarm_code: 3, created_at: new Date(now - 5*3600000).toISOString() },
      { alarm_code: 0, created_at: new Date(now - 4*3600000).toISOString() },
      { alarm_code: 1, created_at: now.toISOString() }
    ];
  }

  // ---- 演示模式实时模拟 ----
  function startDemoLoop() {
    if (demoTimer) clearInterval(demoTimer);
    demoTimer = setInterval(function() {
      var now = new Date();
      var hour = now.getHours();
      var isDaytime = hour >= 6 && hour <= 20;
      var baseTemp = 22 + 4 * Math.sin(hour * Math.PI / 12);
      var baseHum = 55 - 5 * Math.sin(hour * Math.PI / 12);

      var data = {
        temperature: +(baseTemp + (Math.random() - 0.5) * 3).toFixed(1),
        humidity: +(baseHum + (Math.random() - 0.5) * 10).toFixed(1),
        ambient_light: +(isDaytime ? 200 + Math.random() * 1500 : Math.random() * 5).toFixed(0),
        alarm_status: Math.random() < 0.1,
        reported_at: now.toISOString()
      };

      mockTelemetry.push(data);
      if (mockTelemetry.length > 20) mockTelemetry.shift();

      updateMetricCards(data);
      updateCharts(mockTelemetry);
      $('nav-last-update').textContent = formatTime(data.reported_at);

      if (data.alarm_status) {
        var codes = [1, 2, 3];
        var code = codes[Math.floor(Math.random() * codes.length)];
        var evt = { alarm_code: code, created_at: now.toISOString() };
        mockAlarmEvents.unshift(evt);
        if (mockAlarmEvents.length > 20) mockAlarmEvents.pop();
        updateAlarmTable(mockAlarmEvents);
        showToast('⚠️ 设备触发报警！', 'error');
      }
    }, 5000);
  }

  function enterDemo() {
    isDemo = true;
    generateMockData();
    showDashboard('演示用户', true);
    $('demo-badge').classList.remove('hidden');
    showToast('已进入演示模式，数据为模拟', 'info');
    startDemoLoop();
  }

  // ---- Auth Tab 切换 ----
  function switchAuthTab(mode) {
    authMode = mode;
    var isLogin = mode === 'login';
    $('tab-login').className = isLogin
      ? 'flex-1 py-2 text-sm font-medium rounded-md bg-gray-700 text-white transition'
      : 'flex-1 py-2 text-sm font-medium rounded-md text-gray-400 hover:text-white transition';
    $('tab-register').className = !isLogin
      ? 'flex-1 py-2 text-sm font-medium rounded-md bg-gray-700 text-white transition'
      : 'flex-1 py-2 text-sm font-medium rounded-md text-gray-400 hover:text-white transition';
    $('confirm-password-group').classList.toggle('hidden', isLogin);
    $('auth-submit-text').textContent = isLogin ? '登 录' : '注 册';
    $('auth-error').classList.add('hidden');
    $('btn-demo').classList.toggle('hidden', !isLogin);
  }

  // ---- Auth 提交 ----
  function handleAuthSubmit(e) {
    e.preventDefault();
    if (!supabase) {
      $('auth-error').textContent = 'Supabase 未连接，请使用演示模式';
      $('auth-error').classList.remove('hidden');
      return;
    }
    var username = $('auth-username').value.trim();
    var password = $('auth-password').value;
    var errEl = $('auth-error');

    if (!username || !password) {
      errEl.textContent = '请输入账号和密码';
      errEl.classList.remove('hidden');
      return;
    }

    if (authMode === 'register') {
      var confirm = $('auth-confirm-password').value;
      if (password !== confirm) { errEl.textContent = '两次密码不一致'; errEl.classList.remove('hidden'); return; }
      if (password.length < 4) { errEl.textContent = '密码至少 4 位'; errEl.classList.remove('hidden'); return; }

      supabase.from('users').select('id').eq('username', username).maybeSingle().then(function(r) {
        if (r.data) { errEl.textContent = '该账号已被注册'; errEl.classList.remove('hidden'); return; }
        return supabase.from('users').insert({ username: username, password: password });
      }).then(function(r) {
        if (r && r.error) { errEl.textContent = '注册失败: ' + r.error.message; errEl.classList.remove('hidden'); return; }
        if (r) {
          localStorage.setItem('booth_monitor_session', JSON.stringify({ username: username, ts: Date.now() }));
          showDashboard(username);
        }
      }).catch(function(err) {
        errEl.textContent = '注册失败: ' + err.message;
        errEl.classList.remove('hidden');
      });
    } else {
      supabase.from('users').select('*').eq('username', username).maybeSingle().then(function(r) {
        if (r.error || !r.data || r.data.password !== password) {
          errEl.textContent = '账号或密码错误';
          errEl.classList.remove('hidden');
          return;
        }
        localStorage.setItem('booth_monitor_session', JSON.stringify({ username: username, ts: Date.now() }));
        showDashboard(username);
      }).catch(function(err) {
        errEl.textContent = '登录失败: ' + err.message;
        errEl.classList.remove('hidden');
      });
    }
  }

  // ---- 登出 ----
  function handleLogout() {
    localStorage.removeItem('booth_monitor_session');
    $('dashboard-view').classList.add('hidden');
    $('auth-view').classList.remove('hidden');
    $('btn-demo').classList.remove('hidden');
    if (realtimeChannel && supabase) { supabase.removeChannel(realtimeChannel); realtimeChannel = null; }
    if (demoTimer) { clearInterval(demoTimer); demoTimer = null; }
    if (dataPollTimer) { clearInterval(dataPollTimer); dataPollTimer = null; }
    if (pollTimer) { clearInterval(pollTimer); pollTimer = null; }
    currentUser = null;
    isDemo = false;
  }

  // ---- 进入仪表盘 ----
  function showDashboard(username, offline) {
    currentUser = username;
    if (offline) isDemo = true;
    $('auth-view').classList.add('hidden');
    $('dashboard-view').classList.remove('hidden');
    $('nav-user-email').textContent = username;
    $('demo-badge').classList.toggle('hidden', !isDemo);

    if (isDemo) {
      updateMetricCards(mockTelemetry[mockTelemetry.length - 1]);
      updateCharts(mockTelemetry);
      updateControlButtons(localState);
      updateAlarmTable(mockAlarmEvents);
      $('nav-last-update').textContent = formatTime(new Date().toISOString());
    } else {
      loadRealData();
      loadSettings();
      // 前端主动触发 Edge Function 拉取 oneNET 数据（每 30 秒）
      if (pollTimer) clearInterval(pollTimer);
      pollTimer = setInterval(callEdgePoll, 30000);
      callEdgePoll(); // 立即执行一次
      // 每 10 秒刷新本地最新数据
      if (dataPollTimer) clearInterval(dataPollTimer);
      dataPollTimer = setInterval(refreshLatest, 10000);
    }
  }

  // ---- 调用云端 Edge Function 拉取 oneNET ----
  function callEdgePoll() {
    if (isDemo || !SUPABASE_URL) return;
    fetch(SUPABASE_URL + '/functions/v1/booth-bridge', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ action: 'poll' }),
    }).catch(function() {});
  }

  // ---- 保底轮询最新数据 ----
  var dataPollTimer = null;
  var pollTimer = null;
  function refreshLatest() {
    if (!supabase || !currentDeviceId || isDemo) return;
    // 拉最新数据刷新卡片和图表
    supabase.from('telemetry').select('*').eq('device_id', currentDeviceId).order('reported_at', { ascending: false }).limit(1).single().then(function(r) {
      if (r.data) {
        updateMetricCards(r.data);
        $('nav-last-update').textContent = formatTime(r.data.reported_at);
        // 追加到图表
        if (tempHumidityChart) {
          var ts = new Date(r.data.reported_at).getTime();
          addChartPoint(tempHumidityChart, ts, [r.data.temperature, r.data.humidity]);
          addChartPoint(lightChart, ts, [r.data.ambient_light]);
        }
      }
    });
    // 取最新20条，反转后给图表（图表从左到右时间递增）
    supabase.from('telemetry').select('*').eq('device_id', currentDeviceId).order('reported_at', { ascending: false }).limit(20).then(function(r) {
      if (r.data && r.data.length > 0) { r.data.reverse(); updateCharts(r.data); }
    });
  }

  // ---- 真实数据加载 ----
  function loadRealData() {
    if (!supabase) return;
    supabase.from('devices').select('*').limit(1).then(function(r) {
      if (r.error || !r.data || r.data.length === 0) {
        showToast('未找到设备，请先执行 seed.sql', 'error');
        return;
      }
      currentDeviceId = r.data[0].id;
      $('nav-device-name').textContent = r.data[0].device_name + ' · ' + (r.data[0].location || '');

      return Promise.all([
        supabase.from('telemetry').select('*').eq('device_id', currentDeviceId).order('reported_at', { ascending: false }).limit(1).single(),
        supabase.from('telemetry').select('*').eq('device_id', currentDeviceId).order('reported_at', { ascending: false }).limit(20),
        supabase.from('device_state').select('*').eq('device_id', currentDeviceId).single(),
        supabase.from('alarm_events').select('*').eq('device_id', currentDeviceId).order('created_at', { ascending: false }).limit(20)
      ]);
    }).then(function(results) {
      if (!results) return;
      if (results[0].data) updateMetricCards(results[0].data);
      if (results[1].data && results[1].data.length) {
        results[1].data.reverse();
        mockTelemetry = results[1].data;
        updateCharts(results[1].data);
        $('nav-last-update').textContent = formatTime(results[1].data[results[1].data.length - 1].reported_at);
      }
      if (results[2].data) updateControlButtons(results[2].data);
      if (results[3].data && results[3].data.length) updateAlarmTable(results[3].data);
      subscribeRealtime();
    }).catch(function(err) {
      console.error('加载数据失败:', err);
      showToast('数据加载失败: ' + err.message, 'error');
    });
  }

  // ---- UI 更新函数 ----
  function updateMetricCards(data) {
    $('card-temperature').textContent = data.temperature != null ? data.temperature.toFixed(1) : '--';
    $('card-humidity').textContent = data.humidity != null ? data.humidity.toFixed(1) : '--';
    $('card-light').textContent = data.ambient_light != null ? data.ambient_light.toFixed(0) : '--';

    var card = $('card-alarm');
    var text = $('card-alarm-text');
    var icon = $('alarm-icon');
    var sub = $('card-alarm-sub');

    if (data.alarm_status) {
      text.textContent = '报警中';
      text.className = 'text-3xl font-bold text-red-400';
      card.className = 'bg-red-950/30 border border-red-800 rounded-xl p-5';
      card.style.animation = 'pulse-alarm 1.5s ease-in-out infinite';
      icon.innerHTML = '<svg class="w-4 h-4 text-red-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01M12 3l9.66 16.5H2.34L12 3z"/></svg>';
      icon.className = 'w-8 h-8 rounded-lg bg-red-500/20 flex items-center justify-center';
      sub.textContent = '请及时处理';
    } else {
      text.textContent = '正常';
      text.className = 'text-3xl font-bold text-green-400';
      card.className = 'bg-gray-900 border border-gray-800 rounded-xl p-5';
      card.style.animation = '';
      icon.innerHTML = '<svg class="w-4 h-4 text-green-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>';
      icon.className = 'w-8 h-8 rounded-lg bg-green-500/10 flex items-center justify-center';
      sub.textContent = '所有指标正常';
    }
  }

  function updateControlButtons(state) {
    localState = state;
    var btnArm = $('btn-arm');
    var btnDisarm = $('btn-disarm');
    var btnBeep = $('btn-beep');
    var beepIcon = $('beep-icon');
    var beepLabel = $('beep-label');
    var base = 'flex-1 py-3 rounded-xl font-medium text-sm transition-all duration-200 active:scale-[0.97] border';
    var baseInactive = 'flex-1 py-3 rounded-xl font-medium text-sm transition-all duration-200 active:scale-[0.97] border border-gray-700 text-gray-500 hover:border-gray-500 hover:text-gray-300';

    if (state.sensor_armed) {
      btnArm.className = base + ' bg-green-600/20 border-green-600 text-green-400';
      btnDisarm.className = baseInactive;
    } else {
      btnDisarm.className = base + ' bg-amber-600/20 border-amber-600 text-amber-400';
      btnArm.className = baseInactive;
    }

    if (state.beep_enabled) {
      btnBeep.className = 'w-full py-3 rounded-xl font-medium text-sm transition-all duration-200 active:scale-[0.97] border bg-blue-600/20 border-blue-600 text-blue-400 flex items-center justify-center gap-2';
      beepIcon.textContent = '🔊';
      beepLabel.textContent = '已开启';
    } else {
      btnBeep.className = 'w-full py-3 rounded-xl font-medium text-sm transition-all duration-200 active:scale-[0.97] border border-gray-700 text-gray-500 hover:border-gray-500 hover:text-gray-300 flex items-center justify-center gap-2';
      beepIcon.textContent = '🔇';
      beepLabel.textContent = '已静音';
    }
  }

  function updateAlarmTable(events) {
    var tbody = $('alarm-tbody');
    var table = $('alarm-table');
    var empty = $('alarm-empty');

    if (!events || events.length === 0) {
      table.classList.add('hidden');
      empty.classList.remove('hidden');
      return;
    }
    table.classList.remove('hidden');
    empty.classList.add('hidden');

    tbody.innerHTML = events.map(function(e) {
      var b = alarmBadge(e.alarm_code);
      return '<tr class="border-b border-gray-800/50">' +
        '<td class="py-2 text-gray-400 text-xs">' + formatTime(e.created_at) + '</td>' +
        '<td class="py-2"><span class="inline-block px-2 py-0.5 rounded text-xs font-medium ' + b.color + '">' + b.label + '</span></td>' +
        '<td class="py-2 text-gray-300 text-xs">' + b.desc + '</td></tr>';
    }).join('');
  }

  // ---- 图表 ----
  function formatChartLabel(iso) {
    var t = new Date(iso);
    return ('0'+t.getHours()).slice(-2) + ':' + ('0'+t.getMinutes()).slice(-2);
  }

  function makeChartOptions(yMax, yTitle, yColor) {
    var opt = {
      responsive: true, maintainAspectRatio: false,
      animation: { duration: 300 },
      interaction: { intersect: false, mode: 'index' },
      plugins: {
        legend: { labels: { color: '#9ca3af', usePointStyle: true, pointStyleWidth: 8, padding: 16, font: { size: 11 } } },
        tooltip: { backgroundColor: '#1f2937', borderColor: '#374151', borderWidth: 1, titleColor: '#f3f4f6', bodyColor: '#d1d5db', padding: 10, cornerRadius: 8 }
      },
      scales: {
        x: { grid: { color: 'rgba(255,255,255,0.06)' }, ticks: { color: '#6b7280', font: { size: 9 }, maxTicksLimit: 8, autoSkip: true } },
        y: { grid: { color: 'rgba(255,255,255,0.06)' }, ticks: { color: '#6b7280', font: { size: 9 } }, border: { display: false }, min: 0, max: yMax || 50 }
      }
    };
    if (yTitle) opt.scales.y.title = { display: true, text: yTitle, color: yColor, font: { size: 10 } };
    return opt;
  }

  function updateCharts(data) {
    if (typeof Chart === 'undefined') { console.warn('Chart.js 未加载'); return; }

    var labels = data.map(function(d) { return formatChartLabel(d.reported_at); });

    try {
      // 温湿度图
      if (tempHumidityChart) {
        tempHumidityChart.data.labels = labels;
        tempHumidityChart.data.datasets[0].data = data.map(function(d) { return d.temperature; });
        tempHumidityChart.data.datasets[1].data = data.map(function(d) { return d.humidity; });
        tempHumidityChart.update('none');
      } else {
        tempHumidityChart = new Chart($('chart-th').getContext('2d'), {
          type: 'line',
          data: {
            labels: labels,
            datasets: [
              { label: '温度 (℃)', data: data.map(function(d) { return d.temperature; }), borderColor: '#f87171', borderWidth: 1.5, pointRadius: 0, pointHoverRadius: 4, pointHoverBackgroundColor: '#f87171', tension: 0.3, yAxisID: 'y' },
              { label: '湿度 (%)', data: data.map(function(d) { return d.humidity; }), borderColor: '#2dd4bf', borderWidth: 1.5, pointRadius: 0, pointHoverRadius: 4, pointHoverBackgroundColor: '#2dd4bf', tension: 0.3, yAxisID: 'y1' }
            ]
          },
          options: Object.assign(makeChartOptions(50, '℃', '#f87171'), {
            scales: Object.assign(makeChartOptions(50).scales, {
              y: Object.assign(makeChartOptions(50).scales.y, { position: 'left' }),
              y1: { type: 'linear', position: 'right', grid: { display: false }, ticks: { color: '#6b7280', font: { size: 9 } }, border: { display: false }, min: 0, max: 100, title: { display: true, text: '%', color: '#2dd4bf', font: { size: 10 } } }
            })
          })
        });
      }

      // 光照图
      if (lightChart) {
        lightChart.data.labels = labels;
        lightChart.data.datasets[0].data = data.map(function(d) { return d.ambient_light; });
        lightChart.update('none');
      } else {
        lightChart = new Chart($('chart-light').getContext('2d'), {
          type: 'line',
          data: {
            labels: labels,
            datasets: [{ label: '光照 (lx)', data: data.map(function(d) { return d.ambient_light; }), borderColor: '#fbbf24', backgroundColor: 'rgba(251,191,36,0.08)', fill: true, borderWidth: 1.5, pointRadius: 0, pointHoverRadius: 4, pointHoverBackgroundColor: '#fbbf24', tension: 0.3 }]
          },
          options: makeChartOptions(2000, 'lx', '#fbbf24')
        });
      }
    } catch (e) {
      console.error('图表渲染失败:', e.message || e);
    }
  }

  // ---- Realtime 订阅 ----
  function subscribeRealtime() {
    if (!currentDeviceId || !supabase) return;
    if (realtimeChannel) { supabase.removeChannel(realtimeChannel); }

    realtimeChannel = supabase.channel('device-monitor')
      .on('postgres_changes', { event:'INSERT', schema:'public', table:'telemetry', filter:'device_id=eq.'+currentDeviceId },
        function(payload) {
          updateMetricCards(payload.new);
          $('nav-last-update').textContent = formatTime(payload.new.reported_at);
          if (tempHumidityChart) {
            var label = formatChartLabel(payload.new.reported_at);
            addChartPoint(tempHumidityChart, label, [payload.new.temperature, payload.new.humidity]);
            addChartPoint(lightChart, label, [payload.new.ambient_light]);
          }
          if (payload.new.alarm_status) showToast('⚠️ 设备触发报警！', 'error');
        })
      .on('postgres_changes', { event:'INSERT', schema:'public', table:'alarm_events', filter:'device_id=eq.'+currentDeviceId },
        function(payload) {
          var badge = alarmBadge(payload.new.alarm_code);
          showToast(badge.label + ': ' + badge.desc, payload.new.alarm_code === 0 ? 'success' : 'error');
          supabase.from('alarm_events').select('*').eq('device_id', currentDeviceId).order('created_at', { ascending:false }).limit(20).then(function(r) {
            if (r.data) updateAlarmTable(r.data);
          });
        })
      .on('postgres_changes', { event:'UPDATE', schema:'public', table:'device_state', filter:'device_id=eq.'+currentDeviceId },
        function(payload) { updateControlButtons(payload.new); })
      .subscribe(function(status) {
        if (status === 'CHANNEL_ERROR') {
          setTimeout(function() { realtimeChannel = null; subscribeRealtime(); }, 5000);
        }
      });
  }

  function addChartPoint(chart, label, values) {
    if (!chart) return;
    chart.data.labels.push(label);
    values.forEach(function(v, i) { chart.data.datasets[i].data.push(v); });
    if (chart.data.datasets[0].data.length > 20) {
      chart.data.labels.shift();
      chart.data.datasets.forEach(function(ds) { ds.data.shift(); });
    }
    chart.update('none');
  }

  // ---- 设置面板 ----
  function loadSettings() {
    if (!currentUser || !supabase) return;
    supabase.from('profiles').select('*').eq('username', currentUser).maybeSingle().then(function(r) {
      if (r.data) {
        $('set-product-id').value = r.data.product_id || '';
        $('set-device-name').value = r.data.device_name || '';
        $('set-access-key').value = r.data.access_key || '';
        $('set-user-id').value = r.data.onenet_user_id || '';
        $('nav-device-name').textContent = (r.data.device_name || '--') + ' · 已绑定';
      }
    }).catch(function() {});
  }

  $('btn-settings').addEventListener('click', function() {
    if (isDemo) { showToast('演示模式无需设置', 'info'); return; }
    loadSettings();
    $('settings-overlay').classList.remove('hidden');
  });

  $('btn-settings-close').addEventListener('click', function() {
    $('settings-overlay').classList.add('hidden');
  });

  $('settings-overlay').addEventListener('click', function(e) {
    if (e.target === this) $('settings-overlay').classList.add('hidden');
  });

  $('settings-form').addEventListener('submit', function(e) {
    e.preventDefault();
    if (!supabase || !currentUser) return;

    var data = {
      username: currentUser,
      product_id: $('set-product-id').value.trim(),
      device_name: $('set-device-name').value.trim(),
      access_key: $('set-access-key').value.trim(),
      onenet_user_id: $('set-user-id').value.trim(),
      updated_at: new Date().toISOString(),
    };

    supabase.from('profiles').upsert(data, { onConflict: 'username' }).then(function(r) {
      if (r.error) {
        $('settings-error').textContent = '保存失败: ' + r.error.message;
        $('settings-error').classList.remove('hidden');
        return;
      }
      $('settings-error').classList.add('hidden');
      $('settings-overlay').classList.add('hidden');
      $('nav-device-name').textContent = data.device_name + ' · 已绑定';
      showToast('配置已保存', 'success');
    });
  });

  // ---- 远程控制 ----
  function handleCommand(command) {
    console.log('handleCommand 被调用:', command);
    var names = { arm: '远程布防', disarm: '远程撤防', toggle_beep: '蜂鸣器切换' };

    if (isDemo) {
      if (command === 'arm') localState.sensor_armed = true;
      else if (command === 'disarm') localState.sensor_armed = false;
      else if (command === 'toggle_beep') localState.beep_enabled = !localState.beep_enabled;
      updateControlButtons(localState);
      showToast(names[command] + '指令已下发', 'success');
      return;
    }

    if (!currentDeviceId || !supabase) {
      showToast('请先配置 Supabase 连接信息', 'error');
      return;
    }

    // 即时更新本地状态，不等后端，不查DB
    if (command === 'toggle_beep') localState.beep_enabled = !localState.beep_enabled;
    else if (command === 'arm') localState.sensor_armed = true;
    else if (command === 'disarm') localState.sensor_armed = false;
    updateControlButtons(localState);

    // 写入记录 + 调用 Edge Function
    supabase.from('device_commands').insert({ device_id: currentDeviceId, command: command }).then(function(r) {
      if (r.error) { showToast(names[command] + '指令下发失败: ' + r.error.message, 'error'); return; }
      showToast(names[command] + '指令已下发', 'success');

      var cmdId = r.data ? r.data[0]?.id : null;
      fetch(SUPABASE_URL + '/functions/v1/booth-bridge', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          action: 'command',
          device_id: currentDeviceId,
          command: command,
          cmd_id: cmdId,
        }),
      }).catch(function() {});
    });
  }

  // ---- 工具函数 ----
  function showToast(message, type) {
    var container = $('toast-container');
    var el = document.createElement('div');
    var colors = {
      success: 'border-green-600 bg-green-950/80 text-green-300',
      error: 'border-red-600 bg-red-950/80 text-red-300',
      info: 'border-blue-600 bg-blue-950/80 text-blue-300'
    };
    el.className = 'border ' + (colors[type] || colors.info) + ' rounded-lg px-4 py-3 text-sm shadow-lg backdrop-blur';
    el.style.animation = 'slide-up 0.3s ease-out';
    el.textContent = message;
    container.appendChild(el);
    setTimeout(function() { el.style.opacity='0'; el.style.transition='opacity 0.3s'; setTimeout(function() { el.remove(); }, 300); }, 3500);
  }

  function formatTime(iso) {
    if (!iso) return '--';
    var d = new Date(iso);
    var pad = function(n) { return String(n).padStart(2,'0'); };
    return d.getFullYear() + '-' + pad(d.getMonth()+1) + '-' + pad(d.getDate()) + ' ' + pad(d.getHours()) + ':' + pad(d.getMinutes()) + ':' + pad(d.getSeconds());
  }

  function alarmBadge(code) {
    var map = {
      0: { label:'恢复', color:'bg-green-500/20 text-green-400', desc:'恢复正常' },
      1: { label:'温度过高', color:'bg-red-500/20 text-red-400', desc:'温度超出上限' },
      2: { label:'湿度过高', color:'bg-red-500/20 text-red-400', desc:'湿度超出上限' },
      3: { label:'光线过暗', color:'bg-amber-500/20 text-amber-400', desc:'光照低于阈值' }
    };
    return map[code] || { label:'未知', color:'bg-gray-500/20 text-gray-400', desc:'未知类型' };
  }

  // ---- 全局暴露 ----
  window.handleCommand = handleCommand;

  // ---- 初始化 ----
  function init() {
    console.log('展台监测系统 初始化开始');

    // 事件绑定
    $('tab-login').addEventListener('click', function() { switchAuthTab('login'); });
    $('tab-register').addEventListener('click', function() { switchAuthTab('register'); });
    $('auth-form').addEventListener('submit', handleAuthSubmit);
    $('btn-logout').addEventListener('click', handleLogout);
    $('btn-demo').addEventListener('click', enterDemo);

    console.log('事件绑定完成');

    // 检查 Supabase 是否可用
    var hasSupabase = typeof window.supabase !== 'undefined';
    var hasConfig = SUPABASE_URL !== 'YOUR_SUPABASE_URL' && SUPABASE_ANON_KEY !== 'YOUR_SUPABASE_ANON_KEY';

    console.log('Supabase SDK可用:', hasSupabase, '已配置:', hasConfig);

    if (hasSupabase && hasConfig) {
      try {
        supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        console.log('Supabase 客户端已创建');
      } catch (e) {
        console.error('Supabase 初始化失败:', e);
      }
    }

    // SDK 加载失败提示
    if (hasConfig && !hasSupabase) {
      document.getElementById('btn-demo').classList.remove('hidden');
      var note = document.querySelector('#auth-view p:last-of-type');
      if (note) note.textContent = 'SDK 加载失败，请使用演示模式或刷新重试';
    }

    // 检查本地 session
    var saved = localStorage.getItem('booth_monitor_session');
    if (saved) {
      try {
        var session = JSON.parse(saved);
        if (session.username && session.ts && (Date.now() - session.ts < 7*24*3600*1000)) {
          console.log('恢复会话:', session.username);
          showDashboard(session.username);
          return;
        }
      } catch (_) {}
      localStorage.removeItem('booth_monitor_session');
    }

    // 无 Supabase 配置 → 自动进入演示
    if (!hasConfig) {
      console.log('无 Supabase 配置，自动进入演示模式');
      setTimeout(enterDemo, 200);
    } else {
      console.log('显示登录页');
    }
  }

  // 页面就绪后初始化
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
  } else {
    init();
  }

})();
</script>

</body>
</html>
